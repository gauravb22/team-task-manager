<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tasks | Team Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/dashboard.html">
          <span class="brand-mark">T</span>
          <span>Team Task Manager</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link active" href="/tasks.html">Tasks</a></li>
          </ul>
          <div class="d-flex align-items-center gap-2">
            <span id="userPill" class="badge text-bg-light"></span>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm" type="button">
              <i class="bi bi-box-arrow-right"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
          <h1 class="h3 mb-1">Tasks</h1>
          <div class="text-muted-small">Create, assign, and update work</div>
        </div>
        <select id="statusFilter" class="form-select w-auto">
          <option value="ALL">All status</option>
          <option value="TODO">Todo</option>
          <option value="IN_PROGRESS">In progress</option>
          <option value="COMPLETED">Completed</option>
        </select>
      </div>

      <div id="taskAlert" class="alert alert-danger d-none" role="alert"></div>

      <section id="taskCreatePanel" class="page-panel p-3 p-md-4 mb-4">
        <h2 class="h5 mb-3">Create Task</h2>
        <form id="taskForm" class="row g-3">
          <div class="col-md-4">
            <label class="form-label" for="projectId">Project</label>
            <select class="form-select" id="projectId" name="projectId" required>
              <option value="">Select project</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label" for="taskTitle">Title</label>
            <input class="form-control" id="taskTitle" name="title" type="text" required>
          </div>
          <div class="col-md-4">
            <label class="form-label" for="assignedToEmail">Assign to email</label>
            <input class="form-control" id="assignedToEmail" name="assignedToEmail" type="email">
          </div>
          <div class="col-md-4">
            <label class="form-label" for="taskDueDate">Due date</label>
            <input class="form-control" id="taskDueDate" name="dueDate" type="date">
          </div>
          <div class="col-md-4">
            <label class="form-label" for="taskPriority">Priority</label>
            <select class="form-select" id="taskPriority" name="priority">
              <option value="LOW">Low</option>
              <option value="MEDIUM" selected>Medium</option>
              <option value="HIGH">High</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label" for="taskDescription">Description</label>
            <input class="form-control" id="taskDescription" name="description" type="text">
          </div>
          <div class="col-12">
            <button class="btn btn-app" type="submit">
              <i class="bi bi-plus-lg me-1"></i>Add task
            </button>
          </div>
        </form>
      </section>

      <section class="page-panel p-3 p-md-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h5 mb-0">Task List</h2>
        </div>
        <div id="emptyTasks" class="text-muted-small d-none">No tasks found.</div>
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>Task</th>
                <th>Project</th>
                <th>Due</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Assigned</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="taskRows"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/tasks.js"></script>
</body>
</html>
