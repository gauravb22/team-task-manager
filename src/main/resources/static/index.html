<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Team Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
</head>
<body>
  <main class="auth-wrap">
    <section class="auth-panel p-4">
      <div class="d-flex align-items-center gap-2 mb-4">
        <span class="brand-mark">T</span>
        <div>
          <h1 class="h4 mb-0">Team Task Manager</h1>
          <div class="text-muted-small">Sign in to continue</div>
        </div>
      </div>

      <div id="authAlert" class="alert alert-danger d-none" role="alert"></div>

      <ul class="nav nav-pills nav-fill mb-3" id="authTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#loginPane" type="button" role="tab">Login</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="signup-tab" data-bs-toggle="pill" data-bs-target="#signupPane" type="button" role="tab">Signup</button>
        </li>
      </ul>

      <div class="tab-content">
        <div class="tab-pane fade show active" id="loginPane" role="tabpanel" aria-labelledby="login-tab">
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label" for="loginEmail">Email</label>
              <input class="form-control" id="loginEmail" name="email" type="email" required autocomplete="email">
            </div>
            <div class="mb-3">
              <label class="form-label" for="loginPassword">Password</label>
              <input class="form-control" id="loginPassword" name="password" type="password" required autocomplete="current-password">
            </div>
            <button class="btn btn-app w-100" type="submit">
              <i class="bi bi-box-arrow-in-right me-1"></i>Login
            </button>
          </form>
        </div>

        <div class="tab-pane fade" id="signupPane" role="tabpanel" aria-labelledby="signup-tab">
          <form id="signupForm">
            <div class="mb-3">
              <label class="form-label" for="signupName">Name</label>
              <input class="form-control" id="signupName" name="name" type="text" required autocomplete="name">
            </div>
            <div class="mb-3">
              <label class="form-label" for="signupEmail">Email</label>
              <input class="form-control" id="signupEmail" name="email" type="email" required autocomplete="email">
            </div>
            <div class="mb-3">
              <label class="form-label" for="signupPassword">Password</label>
              <input class="form-control" id="signupPassword" name="password" type="password" minlength="6" required autocomplete="new-password">
            </div>
            <div class="mb-3">
              <label class="form-label" for="signupRole">Role</label>
              <select class="form-select" id="signupRole" name="role">
                <option value="MEMBER">Member</option>
                <option value="ADMIN">Admin</option>
              </select>
            </div>
            <button class="btn btn-app w-100" type="submit">
              <i class="bi bi-person-plus me-1"></i>Create account
            </button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
