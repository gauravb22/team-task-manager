<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard | Team Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/dashboard.html">
          <span class="brand-mark">T</span>
          <span>Team Task Manager</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link active" href="/dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="/tasks.html">Tasks</a></li>
          </ul>
          <div class="d-flex align-items-center gap-2">
            <span id="userPill" class="badge text-bg-light"></span>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm" type="button">
              <i class="bi bi-box-arrow-right"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
          <h1 class="h3 mb-1">Dashboard</h1>
          <div class="text-muted-small">Task summary and projects</div>
        </div>
        <a class="btn btn-app" href="/tasks.html">
          <i class="bi bi-list-check me-1"></i>Open tasks
        </a>
      </div>

      <div id="dashboardAlert" class="alert alert-danger d-none" role="alert"></div>

      <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div id="totalTasks" class="stat-value">0</div>
            <div class="stat-label">Total tasks</div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div id="completedTasks" class="stat-value text-success">0</div>
            <div class="stat-label">Completed</div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div id="pendingTasks" class="stat-value text-primary">0</div>
            <div class="stat-label">Pending</div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div id="overdueTasks" class="stat-value text-danger">0</div>
            <div class="stat-label">Overdue</div>
          </div>
        </div>
      </div>

      <section id="projectPanel" class="page-panel p-3 p-md-4 mb-4">
        <h2 class="h5 mb-3">Create Project</h2>
        <form id="projectForm" class="row g-3">
          <div class="col-md-4">
            <label class="form-label" for="projectName">Project name</label>
            <input class="form-control" id="projectName" name="name" type="text" required>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="projectDescription">Description</label>
            <input class="form-control" id="projectDescription" name="description" type="text">
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-app w-100" type="submit">
              <i class="bi bi-plus-lg me-1"></i>Add
            </button>
          </div>
        </form>
      </section>

      <section class="page-panel p-3 p-md-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h5 mb-0">Projects</h2>
        </div>
        <div id="emptyProjects" class="text-muted-small d-none">No projects added yet.</div>
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>Name</th>
                <th>Description</th>
                <th>Created by</th>
                <th>Tasks</th>
              </tr>
            </thead>
            <tbody id="projectRows"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
