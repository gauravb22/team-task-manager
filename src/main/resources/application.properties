spring.application.name=team-task-manager
spring.config.import=optional:file:./local.properties

server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:task_manager}}
spring.datasource.username=${DB_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD:}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
